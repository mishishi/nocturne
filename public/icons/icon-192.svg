<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="50%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4D35E"/>
      <stop offset="70%" stop-color="#E8C547"/>
      <stop offset="100%" stop-color="#D4A83A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="90" fill="url(#sky)" stroke="#F4D35E" stroke-width="3"/>

  <!-- Window frame (棂) - decorative lines -->
  <circle cx="96" cy="96" r="90" fill="none" stroke="#8B9DC3" stroke-width="1" opacity="0.4"/>
  <line x1="96" y1="6" x2="96" y2="186" stroke="#8B9DC3" stroke-width="1" opacity="0.3"/>
  <line x1="6" y1="96" x2="186" y2="96" stroke="#8B9DC3" stroke-width="1" opacity="0.3"/>
  <line x1="36" y1="36" x2="156" y2="156" stroke="#8B9DC3" stroke-width="1" opacity="0.2"/>
  <line x1="156" y1="36" x2="36" y2="156" stroke="#8B9DC3" stroke-width="1" opacity="0.2"/>

  <!-- Stars -->
  <circle cx="30" cy="50" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="50" cy="30" r="1.5" fill="#FFF" opacity="0.6"/>
  <circle cx="140" cy="45" r="1" fill="#FFF" opacity="0.7"/>
  <circle cx="160" cy="70" r="1.5" fill="#FFF" opacity="0.5"/>
  <circle cx="35" cy="140" r="1" fill="#FFF" opacity="0.6"/>
  <circle cx="150" cy="130" r="2" fill="#FFF" opacity="0.7"/>

  <!-- Moon -->
  <circle cx="125" cy="60" r="24" fill="url(#moon)" filter="url(#glow)"/>
  <!-- Moon craters -->
  <circle cx="118" cy="55" r="4" fill="#D4A83A" opacity="0.3"/>
  <circle cx="130" cy="65" r="3" fill="#D4A83A" opacity="0.25"/>
  <circle cx="120" cy="68" r="2" fill="#D4A83A" opacity="0.2"/>

  <!-- Boat silhouette -->
  <path d="M65 135 Q72 128 85 135 Q98 128 105 135 L98 148 Q80 144 72 148 Z" fill="#E8E8E8" opacity="0.9"/>
  <!-- Water reflection -->
  <ellipse cx="85" cy="152" rx="25" ry="3" fill="#8B9DC3" opacity="0.3"/>
</svg>
